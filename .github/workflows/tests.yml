name: Unit tests
on:
    push:
        branches: [dev]
jobs:
    test:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                cpp-version: ['11', '14', '17', '20', '23']
                os: ['ubuntu-latest', 'macos-latest', 'windows-latest']
                compiler: ['g++', 'clang++', 'cl', 'icpx']

                exclude:
                    # macOS
                    - os: macos-latest
                      compiler: g++
                    - os: macos-latest
                      compiler: icpx
                    - os: macos-latest
                      compiler: cl

                    # Windows
                    - os: windows-latest
                      compiler: g++
                    - os: windows-latest
                      compiler: clang++
                    - os: windows-latest
                      compiler: icpx

                    # Ubuntu
                    - os: ubuntu-latest
                      compiler: cl
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Show configuration
              run: |
                echo "OS: ${{ matrix.os }}"
                echo "Compiler: ${{ matrix.compiler }}"
                echo "C++ Version: ${{ matrix.cpp-version }}"

            - name: Install Intel oneAPI
              if: matrix.compiler == 'icpx'
              uses: neelravi/intel-oneapi-github-actions@latest
            
            - name: Install MSVC
              if: matrix.compiler == 'cl'
              uses: TheMrMilchmann/setup-msvc-dev@v4
              with:
                arch: x64

            - name: Setup Python
              uses: actions/setup-python@v6
            
            - name: Install SCons
              run: |
                python -m pip install --upgrade pip
                python -m pip install scons

            - name: Run tests using ${{ matrix.compiler }}, C++${{ matrix.cpp-version }}
              run: scons test --compiler=${{ matrix.compiler }} --cppstd=${{ matrix.cpp-version }}
             